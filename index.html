<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Navigation Flow</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: sans-serif;
  }

  .container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .background {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .character {
    position: absolute;
    bottom: 0;
    height: 100vh; /* scale relative to viewport height */
    width: auto;
    max-width: none;
    object-fit: contain;
    transform-origin: bottom center;
    transition: transform 1.6s cubic-bezier(0.22, 1, 0.36, 1); /* even slower */
    z-index: 2;
    will-change: transform;
  }

  .nav {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    z-index: 3;
  }

  .tab {
    cursor: pointer;
    padding: 10px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    backdrop-filter: blur(10px);
  }
</style>
</head>
<body>
<div class="container">
  <img src="https://ipfs.io/ipfs/bafybeihkhckfk72hi77yrr3sf7leby5agmsq5cpdvel65vw43cb6bx2zb4" class="background" />

  <img id="character" class="character" src="https://ipfs.io/ipfs/bafkreiheo32ehfntwpmxcars2ta4mq3hqhoheqzsr6ygyuyccbvjwpie7e" />

  <div class="nav">
    <div class="tab" data-index="0">Home</div>
    <div class="tab" data-index="1">Games</div>
    <div class="tab" data-index="2">Marketplace</div>
    <div class="tab" data-index="3">Profile</div>
  </div>
</div>

<script>
const character = document.getElementById('character');
const tabs = document.querySelectorAll('.tab');

let currentIndex = 0;
const tabPositions = [200, 500, 800, 1100];

const assets = {
  left1: "https://ipfs.io/ipfs/bafkreiheo32ehfntwpmxcars2ta4mq3hqhoheqzsr6ygyuyccbvjwpie7e",
  left2: "https://ipfs.io/ipfs/bafkreifcpvhdaydz64st2ozhwh4ltgzo6dschjd4ehxtmwiqeuphlcfsby",
  right1: "https://ipfs.io/ipfs/bafkreifdy25dy7oywuhwauo2y7jacny3lghk2vficddvbwx2rpy6f4zxqu",
  right2: "https://ipfs.io/ipfs/bafkreic7tlur3ycl2r3zjuuxbghhfihucexc3biucb753j2576ltrogptq",
  flip: "https://ipfs.io/ipfs/bafkreic6iy37nlapsjm2tgvfzb72fkop47lgwwthjaomyg7sl63pp7lcgy"
};

function animateCharacter(targetIndex) {
  if (targetIndex === currentIndex) return;

  const goingRight = targetIndex > currentIndex;

  // NOTE: assets were mislabeled, so we intentionally swap logic
  const walkFrames = goingRight
    ? [assets.right1, assets.right2]  // actually moving RIGHT
    : [assets.left1, assets.left2];   // actually moving LEFT

  let frame = 0;
  let running = true;

  function walkLoop() {
    if (!running) return;
    character.src = walkFrames[frame % 2];
    frame++;
    setTimeout(() => requestAnimationFrame(walkLoop), 160); // slower frame swap
  }

  walkLoop();

  const distance = Math.abs(targetIndex - currentIndex);
  const duration = 800 + distance * 400; // slower travel

  character.style.transition = `transform ${duration}ms cubic-bezier(0.22,1,0.36,1)`;
  character.style.transform = `translateX(${tabPositions[targetIndex]}px)`;

  setTimeout(() => {
    running = false;

    character.src = assets.flip;

    setTimeout(() => {
      if (targetIndex === 0) {
        character.src = assets.right1; // HOME idle should face LEFT visually (swapped asset)
      } else {
        character.src = assets.left1; // other tabs face RIGHT visually (swapped asset)
      }
      currentIndex = targetIndex;
    }, 250);

  }, duration);
}

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const index = parseInt(tab.dataset.index);
    animateCharacter(index);
  });
});
</script>
</body>
</html>
